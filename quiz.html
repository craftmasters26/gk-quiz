        let selectedCount = 20;
        let currentIdx = 0;
        let score = 0;
        let questions = [];
        let userAnswers = [];
        let timerSeconds = 0;
        let timerInterval = null;

        document.querySelectorAll('.int-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.int-btn').forEach(b => b.classList.remove('bg-[#E8614A]', 'text-white'));
                btn.classList.add('bg-[#E8614A]', 'text-white');
                selectedCount = parseInt(btn.dataset.n);
            });
        });

        function shuffle(arr) {
            return arr.sort(() => Math.random() - 0.5);
        }

        function formatTime(s) {
            const m = Math.floor(s / 60).toString().padStart(2, '0');
            const sec = (s % 60).toString().padStart(2, '0');
            return m + ':' + sec;
        }

        function startQuiz() {
            const pool = shuffle([...QUESTIONS]);
            const count = selectedCount === -1 ? QUESTIONS.length : selectedCount;
            questions = pool.slice(0, count).map(q => {
                const correctVal = q.opts[q.ans];
                const shuffledOpts = shuffle([...q.opts]);
                return {
                    q: q.q,
                    opts: shuffledOpts,
                    ans: shuffledOpts.indexOf(correctVal)
                };
            });

            currentIdx = 0;
            score = 0;
            userAnswers = [];
            timerSeconds = 0;
            
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('quiz-stats').classList.remove('hidden');
            
            startTimer();
            renderQuestion();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerSeconds++;
                document.getElementById('timer-val').textContent = formatTime(timerSeconds);
            }, 1000);
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            document.getElementById('q-label').textContent = `QUESTION ${currentIdx + 1}`;
            document.getElementById('q-text').textContent = q.q;
            document.getElementById('q-counter').textContent = `${currentIdx + 1}/${questions.length}`;
            document.getElementById('progress-bar').style.width = ((currentIdx / questions.length) * 100) + '%';
            
            const container = document.getElementById('opts-container');
            container.innerHTML = '';
            
            q.opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "group flex items-center gap-4 text-left p-6 rounded-2xl border-2 border-slate-100 hover:border-[#E8614A]/20 transition-all bg-white text-slate-600";
                btn.innerHTML = `
                    <span class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 group-hover:bg-[#E8614A]/10 group-hover:text-[#E8614A] font-bold">${String.fromCharCode(65 + i)}</span>
                    <span class="font-medium text-lg">${opt}</span>
                `;
                btn.onclick = () => selectAnswer(i, btn);
                container.appendChild(btn);
            });
            
            document.getElementById('next-btn').classList.add('hidden');
        }

        function selectAnswer(i, btn) {
            const q = questions[currentIdx];
            const alreadyAnswered = userAnswers.length > currentIdx;
            if (alreadyAnswered) return;

            const correct = i === q.ans;
            if (correct) score++;
            userAnswers.push({ chosen: i, correct });

            document.querySelectorAll('#opts-container button').forEach((b, idx) => {
                b.classList.remove('border-[#E8614A]/20');
                if (idx === i) {
                    b.classList.add('border-[#E8614A]', 'bg-[#E8614A]/5', 'text-[#E8614A]');
                    b.querySelector('span:first-child').classList.add('bg-[#E8614A]', 'text-white');
                }
            });

            document.getElementById('next-btn').classList.remove('hidden');
            document.getElementById('next-btn').textContent = currentIdx === questions.length - 1 ? 'Finish' : 'Next Question';
        }

        function nextQuestion() {
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            clearInterval(timerInterval);
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            document.getElementById('final-time').textContent = formatTime(timerSeconds);

            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('score-pct').textContent = pct + '%';
            document.getElementById('score-text').textContent = `${score} / ${questions.length} Correct Answers`;
            document.getElementById('res-correct').textContent = score;
            document.getElementById('res-wrong').textContent = questions.length - score;
            
            const review = document.getElementById('review-container');
            review.innerHTML = '';
            questions.forEach((q, i) => {
                const ua = userAnswers[i];
                const div = document.createElement('div');
                div.className = `p-6 rounded-3xl border-l-8 ${ua.correct ? 'bg-emerald-50 border-emerald-400' : 'bg-rose-50 border-rose-400'}`;
                div.innerHTML = `
                    <div class="font-bold text-slate-800 mb-2">${i+1}. ${q.q}</div>
                    <div class="text-sm">
                        <div class="text-emerald-700 font-bold">Correct: ${q.opts[q.ans]}</div>
                        ${!ua.correct ? `<div class="text-rose-700 font-bold">Your Choice: ${q.opts[ua.chosen]}</div>` : ''}
                    </div>
                `;
                review.appendChild(div);
            });
        }

        function goHome() {
            document.getElementById('start-screen').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-stats').classList.add('hidden');
        }
